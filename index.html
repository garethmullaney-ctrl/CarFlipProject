  .src{max-width:640px}
</style>

/* ============ RENDER: HOME ============ */
function costsOf(c){
  if(!c.model) return null;
  const M=c.model, rep=M.repairDiy, cont=Math.round(0.15*rep);
  const fees = M.feePct!=null ? Math.round(c.currentBid*M.feePct)+(M.feeFixed||0) : M.fees;
  return fees+M.transport+M.recommission+rep+cont;
}
function rowHtml(c){
  const vc=vColor(c.verdict), vt=vTint(c.verdict);
  const costs=costsOf(c);
  const binCell = c.bin ? fmt(c.bin) : '<span class="dash">—</span>';
  let costCell='<span class="pend">pending</span>', profCell='<span class="pend">—</span>';
  if(costs!=null){
    const profit=c.resale.mid - c.currentBid - costs;
    const col=profit>=800?'var(--go)':profit>=250?'var(--caution)':'var(--stop)';
    costCell=fmt(costs);
    profCell=`<b style="color:${col};font-weight:800">${fmt(profit)}</b>`;
  }
  return `<tr onclick="go('${c.id}')">
    <td class="vh"><b>${c.title}</b> <span class="ys">${c.yr}</span><div class="lm">Lot ${c.lot} · ${c.sale}</div></td>
    <td>${c.cat}</td>
    <td class="num">${fmt(c.currentBid)}</td>
    <td class="num">${binCell}</td>
    <td class="num">${fmt(c.resale.mid)}</td>
    <td class="num">${costCell}</td>
    <td class="num">${profCell}</td>
    <td><span class="vchip" style="color:${vc};border-color:${vc};background:${vt}">${VT[c.verdict]}</span></td>
  </tr>`;
}

/* ---- interactive calc ---- */
function wireCalc(c){
  const M=c.model; let bid=M.bidDefault, route='diy';
  const BMIN=M.bidMin??0, BMAX=M.bidMax??1500;
  function paint(){
    const repair=route==='diy'?M.repairDiy:M.repairGarage;
    const cont=Math.round(0.15*repair);
    const fees = M.feePct!=null ? Math.round(bid*M.feePct)+(M.feeFixed||0) : M.fees;
    const allIn=bid+fees+M.transport+M.recommission+repair+cont;
    const P={low:M.resale.low-allIn,mid:M.resale.mid-allIn,high:M.resale.high-allIn};
    document.getElementById('bidOut').textContent=fmt(bid);
    document.getElementById('allInOut').textContent=fmt(allIn);
    document.getElementById('allInBreak').textContent=`  = bid ${fmt(bid)} + fees ${fmt(fees)} + transport ${fmt(M.transport)} + repair ${fmt(repair)} + recommission ${fmt(M.recommission)} + contingency ${fmt(cont)}`;
    const pct=((bid-BMIN)/(BMAX-BMIN)*100).toFixed(1);
    document.getElementById('bid').style.background=`linear-gradient(90deg,var(--petrol) 0%,var(--petrol) ${pct}%,var(--line) ${pct}%)`;
    const order=[['low','Low',M.resale.low],['mid','Expected',M.resale.mid],['high','High',M.resale.high]];
    const maxAbs=Math.max(2000,...Object.values(P).map(v=>Math.abs(v)));
    document.getElementById('profitGrid').innerHTML=order.map(([k,lab,sale])=>{
      const v=P[k], col=v>=800?'var(--go)':v>=250?'var(--caution)':'var(--stop)';
      const w=Math.max(3,Math.min(100,Math.abs(v)/maxAbs*100));
      return `<div class="pcard"><div class="plab">${lab} resale</div><div class="psale">${fmt(sale)}</div>
        <div class="pval" style="color:${col}">${fmt(v)}</div><div class="pbar"><i style="width:${w}%;background:${col}"></i></div></div>`;
    }).join('');
    const med=P.mid, tgt=M.targetProfit; let t,d,col,bg,bd;
    if(med>=tgt){t='GO';d=`Clears your ${fmt(tgt)} target in the expected case (${fmt(med)}). Strong at this bid.`;col='var(--go)';bg='var(--go-tint)';bd='#bfe0cd';}
    else if(med>=tgt*0.5){t='OK';d=`Makes ${fmt(med)} expected — short of ${fmt(tgt)} but a fair margin.`;col='var(--caution)';bg='var(--caution-tint)';bd='#e9cd97';}
    else if(med>=0){t='THIN';d=`Only ${fmt(med)} expected — margin's gone unless resale lands high.`;col='var(--stop)';bg='var(--stop-tint)';bd='#eebbb4';}
    else{t='STOP';d=`Loses money in the expected case (${fmt(med)}). Too much to pay.`;col='var(--stop)';bg='var(--stop-tint)';bd='#eebbb4';}
    const vEl=document.getElementById('verdict');vEl.style.background=bg;vEl.style.borderColor=bd;
    document.getElementById('verdictT').textContent=t;document.getElementById('verdictT').style.color=col;
    document.getElementById('verdictD').textContent=d;
    const mv=document.getElementById('mastVerdict');mv.textContent=t+' @ '+fmt(bid);mv.style.color=col;mv.style.borderColor=col;mv.style.background=bg;
  }
  document.getElementById('bid').addEventListener('input',e=>{bid=+e.target.value;paint();});
  document.querySelectorAll('#repToggle button').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('#repToggle button').forEach(x=>x.classList.remove('on'));b.classList.add('on');route=b.dataset.r;paint();}));
  paint();
}

function drawMileage(data){
  const W=520,H=190,L=44,R=10,T=14,B=26;
  const xs=data.map(d=>d[0]),ys=data.map(d=>d[1]);
  const x0=Math.min(...xs),x1=Math.max(...xs),y1=Math.max(...ys);
  const px=v=>L+(v-x0)/(x1-x0)*(W-L-R), py=v=>T+(1-v/(y1*1.08))*(H-T-B);
  let g='';[0,20000,40000].forEach(v=>{const y=py(v);
    g+=`<line class="gl" x1="${L}" y1="${y}" x2="${W-R}" y2="${y}"/><text class="ax" x="${L-6}" y="${y+3}" text-anchor="end">${v/1000?v/1000+'k':'0'}</text>`;});
  [x0,2018,2023,x1].forEach(v=>{g+=`<text class="ax" x="${px(v)}" y="${H-8}" text-anchor="middle">'${String(v).slice(2)}</text>`;});
  const line=data.map((d,i)=>(i?'L':'M')+px(d[0]).toFixed(1)+' '+py(d[1]).toFixed(1)).join(' ');
  const area=`M${px(x0)} ${py(0)} `+data.map(d=>'L'+px(d[0]).toFixed(1)+' '+py(d[1]).toFixed(1)).join(' ')+` L${px(x1)} ${py(0)} Z`;
  const dots=data.map(d=>`<circle cx="${px(d[0]).toFixed(1)}" cy="${py(d[1]).toFixed(1)}" r="2.4" fill="#0C6E6B"/>`).join('');
  const last=data[data.length-1];
  document.getElementById('mileageChart').innerHTML=g+`<path d="${area}" fill="#0C6E6B" opacity="0.08"/><path d="${line}" fill="none" stroke="#0C6E6B" stroke-width="2.2" stroke-linejoin="round"/>`+dots+
    `<text class="ax" x="${px(last[0])}" y="${py(last[1])-8}" text-anchor="end" style="fill:#15181B;font-weight:700">${last[1].toLocaleString()}</text>`;
}

/* ---- router ---- */
function go(id){location.hash = id?('#/'+id):'#/';}
function route(){
  const id=(location.hash.replace(/^#\/?/,'')||'').trim();
  const car=CARS.find(c=>c.id===id);
  if(car) renderCar(car); else renderHome();
}
window.addEventListener('hashchange',route);
route();
</script>
