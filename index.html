  .scale .lab{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}

  .scale .sub{font-family:var(--mono);font-size:10.5px;color:var(--faint);margin-top:2px}

  .ax{font-family:var(--mono);font-size:10px;fill:var(--faint)}
  .gl{stroke:var(--line2);stroke-width:1}

  ul.clean{list-style:none;font-size:13px}
  ul.clean li{padding:6px 0 6px 22px;position:relative;border-bottom:1px solid var(--line2);color:var(--ink)}

  .bl-head{background:var(--ink);color:#fff;padding:16px 20px;display:flex;flex-wrap:wrap;gap:6px 16px;align-items:baseline;justify-content:space-between}

  .controls{display:grid;grid-template-columns:1.4fr 1fr;gap:20px;align-items:center}
  @media(max-width:620px){.controls{grid-template-columns:1fr}}
  .slabel{display:flex;justify-content:space-between;align-items:baseline;font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:6px}

  input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;background:var(--line);outline:none}

  input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--ink);border:3px solid #fff;cursor:pointer}
  .toggle{display:inline-flex;border:1px solid var(--line);border-radius:4px;overflow:hidden}

  .allin{font-family:var(--mono);font-size:12.5px;color:var(--muted);margin:14px 0 4px;padding-top:14px;border-top:1px solid var(--line2)}
  .allin b{color:var(--ink);font-size:14px}
  .profitgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}
  .pcard{border:1px solid var(--line);border-radius:5px;padding:14px 12px;text-align:center}
  .pcard .plab{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .pcard .psale{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:1px}
  .pcard .pval{font-family:var(--mono);font-size:26px;font-weight:800;margin-top:8px;letter-spacing:-.02em}
  .pbar{height:6px;border-radius:3px;background:var(--line2);margin-top:10px;overflow:hidden}
  .pbar i{display:block;height:100%;border-radius:3px}
  .verdict{margin-top:16px;display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:5px;border:1.5px solid}
  .verdict .vt{font-family:var(--mono);font-weight:800;font-size:15px;letter-spacing:.06em;text-transform:uppercase}

  .pending{background:var(--line2);border:1px dashed var(--line);border-radius:5px;padding:16px;font-size:13px;color:var(--muted);font-family:var(--mono)}
  .lede{font-size:14.5px;line-height:1.55;color:var(--ink)}

  footer{margin-top:22px;padding-top:14px;border-top:1px solid var(--line);font-family:var(--mono);font-size:11px;color:var(--faint);display:flex;flex-wrap:wrap;gap:6px 18px;justify-content:space-between}
  .src{max-width:640px}
</style>
</head>

/* ---- editable repair overrides (saved on this device via localStorage) ---- */
function ovKey(id){return 'cf_ov_'+id;}
function loadOv(id){try{return JSON.parse(localStorage.getItem(ovKey(id)))||{};}catch(e){return{};}}
function saveOv(id,ov){try{localStorage.setItem(ovKey(id),JSON.stringify(ov));}catch(e){}}
function clearOv(id){try{localStorage.removeItem(ovKey(id));}catch(e){}}
function hasOv(id){const o=loadOv(id);return (o&&Object.keys(o).length>0)||loadAdd(id).length>0;}
// custom (user-added) repair lines, saved on device
function addKey(id){return 'cf_add_'+id;}
function loadAdd(id){try{return JSON.parse(localStorage.getItem(addKey(id)))||[];}catch(e){return[];}}
function saveAdd(id,a){try{localStorage.setItem(addKey(id),JSON.stringify(a));}catch(e){}}
function clearAdd(id){try{localStorage.removeItem(addKey(id));}catch(e){}}
// effective per-row value: col 'b' = DIY(best, index1), 'w' = Garage(worst, index2)
function effRow(c,i,col){const ov=loadOv(c.id),d=c.repair.rows[i];const base=col==='b'?d[1]:d[2];const o=ov[i];return (o&&o[col]!=null&&!isNaN(o[col]))?o[col]:base;}
function effSub(c,col){if(!c.repair)return null;let s=0;c.repair.rows.forEach((r,i)=>{s+=effRow(c,i,col);});loadAdd(c.id).forEach(r=>{s+=(+(col==='b'?r.b:r.w)||0);});return s;}
function effRepairDiy(c){return c.repair?effSub(c,'b'):(c.model?c.model.repairDiy:0);}
function effRepairGarage(c){return c.repair?effSub(c,'w'):(c.model?c.model.repairGarage:0);}

function costsOf(c){
  if(!c.model) return null;
  const M=c.model, rep=effRepairDiy(c), cont=Math.round(0.15*rep);
  const fees = M.feePct!=null ? Math.round(c.currentBid*M.feePct)+(M.feeFixed||0) : M.fees;
  return fees+M.transport+M.recommission+rep+cont;
}
function rowHtml(c){
  const vc=vColor(c.verdict), vt=vTint(c.verdict);
  const costs=costsOf(c);
  const isSold = c.sold != null;
  const binCell = c.bin ? fmt(c.bin) : '<span class="dash">—</span>';
  let costCell='<span class="pend">pending</span>', profCell='<span class="pend">—</span>';
  if(isSold){
    costCell = costs!=null ? fmt(costs) : '<span class="dash">—</span>';
    profCell = '<span class="dash">—</span>';
  } else if(costs!=null){
    const profit=c.resale.mid - c.currentBid - costs;
    const col=profit>=800?'var(--go)':profit>=250?'var(--caution)':'var(--stop)';
    costCell=fmt(costs);
    profCell=`<b style="color:${col};font-weight:800">${fmt(profit)}</b>`;
  }
  // "Current bid" column: for a sold lot show the sold price + label, else the live bid
  const bidCell = isSold ? `<b>${fmt(c.sold)}</b><div class="lm">sold price</div>` : fmt(c.currentBid);
  const reg=(c.vrn||(c.history&&c.history.vrn))||null;
  return `<tr onclick="go('${c.id}')">
    <td class="vh"><b>${c.title}</b> <span class="ys">${c.yr}</span>${reg?` <span class="plate">${reg}</span>`:''}<div class="lm">Lot ${c.lot} · ${c.sale}</div></td>
    <td>${c.cat}</td>
    <td class="num">${bidCell}</td>
    <td class="num">${binCell}</td>
    <td class="num">${fmt(c.resale.mid)}</td>
    <td class="num">${costCell}</td>
    <td class="num">${profCell}</td>
    <td><span class="vchip" style="color:${vc};border-color:${vc};background:${vt}">${VT[c.verdict]}</span></td>
  </tr>`;
}

/* ---- editable repair: recompute subtotals, persist, refresh calc ---- */
function wireRepairEdits(c){
  function recalc(){
    // default-row overrides
    const ov=loadOv(c.id);
    document.querySelectorAll('.repcell[data-i]').forEach(inp=>{
      const i=+inp.dataset.i, col=inp.dataset.col;
      let val=parseFloat(inp.value); if(isNaN(val)||val<0) val=0;
      const def=col==='b'?c.repair.rows[i][1]:c.repair.rows[i][2];
      if(!ov[i]) ov[i]={};
      if(Math.round(val)===def){ delete ov[i][col]; if(Object.keys(ov[i]).length===0) delete ov[i]; }
      else ov[i][col]=Math.round(val);
    });
    saveOv(c.id, ov);
    // custom rows
    const add=loadAdd(c.id);
    document.querySelectorAll('.customrow').forEach(tr=>{
      const nameI=tr.querySelector('.cust-name'), j=+nameI.dataset.ci;
      if(!add[j]) add[j]={name:'',link:'',b:0,w:0};
      add[j].name=nameI.value;
      add[j].link=tr.querySelector('.cust-link').value.trim();
      const bI=tr.querySelector('.cust-cost[data-col="b"]'), wI=tr.querySelector('.cust-cost[data-col="w"]');
      add[j].b=Math.max(0,Math.round(parseFloat(bI.value)||0));
      add[j].w=Math.max(0,Math.round(parseFloat(wI.value)||0));
    });
    saveAdd(c.id, add);
    // red-zero styling per cost input
    document.querySelectorAll('.repcell').forEach(inp=>{ inp.classList.toggle('zero', parseFloat(inp.value)===0 || inp.value===''); });
    const sb=effSub(c,'b'), sw=effSub(c,'w');
    document.getElementById('subBest').textContent=fmt(sb);
    document.getElementById('subWorst').textContent=fmt(sw);
    const td=document.getElementById('togDiy'), tg=document.getElementById('togGarage');
    if(td) td.textContent=fmt(sb); if(tg) tg.textContent=fmt(sw);
    REPAIR_LIVE={diy:sb,garage:sw};
    if(REPAINT) REPAINT();
    const rl=document.querySelector('.resetlink');
    if(hasOv(c.id) && !rl){ const cell=document.querySelector('tr.sub td:first-child'); if(cell) cell.insertAdjacentHTML('beforeend',` <a class="resetlink" onclick="resetRepair('${c.id}')">reset to defaults</a>`); }
    if(!hasOv(c.id) && rl){ rl.remove(); }
  }
  document.querySelectorAll('.repcell, .cust-name, .cust-link').forEach(inp=>{ inp.addEventListener('input',recalc); });
}
function addRow(id){ const a=loadAdd(id); a.push({name:'',link:'',b:0,w:0}); saveAdd(id,a); const c=CARS.find(x=>x.id===id); if(c) renderCar(c); }
function removeRow(id,j){ const a=loadAdd(id); a.splice(j,1); saveAdd(id,a); const c=CARS.find(x=>x.id===id); if(c) renderCar(c); }
function resetRepair(id){ clearOv(id); clearAdd(id); const c=CARS.find(x=>x.id===id); if(c) renderCar(c); }

/* ---- interactive calc ---- */
function wireCalc(c){
  const M=c.model; let bid=M.bidDefault, route='diy';
  const BMIN=M.bidMin??0, BMAX=M.bidMax??1500;
  function paint(){
    const repair=route==='diy' ? (REPAIR_LIVE?REPAIR_LIVE.diy:M.repairDiy) : (REPAIR_LIVE?REPAIR_LIVE.garage:M.repairGarage);
    const cont=Math.round(0.15*repair);
    const fees = M.feePct!=null ? Math.round(bid*M.feePct)+(M.feeFixed||0) : M.fees;
    const allIn=bid+fees+M.transport+M.recommission+repair+cont;
    const P={low:M.resale.low-allIn,mid:M.resale.mid-allIn,high:M.resale.high-allIn};
    document.getElementById('bidOut').textContent=fmt(bid);
    document.getElementById('allInOut').textContent=fmt(allIn);
    document.getElementById('allInBreak').textContent=`  = bid ${fmt(bid)} + fees ${fmt(fees)} + transport ${fmt(M.transport)} + repair ${fmt(repair)} + recommission ${fmt(M.recommission)} + contingency ${fmt(cont)}`;
    const pct=((bid-BMIN)/(BMAX-BMIN)*100).toFixed(1);
    document.getElementById('bid').style.background=`linear-gradient(90deg,var(--petrol) 0%,var(--petrol) ${pct}%,var(--line) ${pct}%)`;
    const order=[['low','Low',M.resale.low],['mid','Expected',M.resale.mid],['high','High',M.resale.high]];
    const maxAbs=Math.max(2000,...Object.values(P).map(v=>Math.abs(v)));
    document.getElementById('profitGrid').innerHTML=order.map(([k,lab,sale])=>{
      const v=P[k], col=v>=800?'var(--go)':v>=250?'var(--caution)':'var(--stop)';
      const w=Math.max(3,Math.min(100,Math.abs(v)/maxAbs*100));
      return `<div class="pcard"><div class="plab">${lab} resale</div><div class="psale">${fmt(sale)}</div>
        <div class="pval" style="color:${col}">${fmt(v)}</div><div class="pbar"><i style="width:${w}%;background:${col}"></i></div></div>`;
    }).join('');
    const med=P.mid, tgt=M.targetProfit; let t,d,col,bg,bd;
    if(med>=tgt){t='GO';d=`Clears your ${fmt(tgt)} target in the expected case (${fmt(med)}). Strong at this bid.`;col='var(--go)';bg='var(--go-tint)';bd='#bfe0cd';}
    else if(med>=tgt*0.5){t='OK';d=`Makes ${fmt(med)} expected — short of ${fmt(tgt)} but a fair margin.`;col='var(--caution)';bg='var(--caution-tint)';bd='#e9cd97';}
    else if(med>=0){t='THIN';d=`Only ${fmt(med)} expected — margin's gone unless resale lands high.`;col='var(--stop)';bg='var(--stop-tint)';bd='#eebbb4';}
    else{t='STOP';d=`Loses money in the expected case (${fmt(med)}). Too much to pay.`;col='var(--stop)';bg='var(--stop-tint)';bd='#eebbb4';}
    const vEl=document.getElementById('verdict');vEl.style.background=bg;vEl.style.borderColor=bd;
    document.getElementById('verdictT').textContent=t;document.getElementById('verdictT').style.color=col;
    document.getElementById('verdictD').textContent=d;
    if(c.sold==null){const mv=document.getElementById('mastVerdict');mv.textContent=t+' @ '+fmt(bid);mv.style.color=col;mv.style.borderColor=col;mv.style.background=bg;}
  }
  document.getElementById('bid').addEventListener('input',e=>{bid=+e.target.value;paint();});
  document.querySelectorAll('#repToggle button').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('#repToggle button').forEach(x=>x.classList.remove('on'));b.classList.add('on');route=b.dataset.r;paint();}));
  REPAINT=paint;
  paint();
}

/* ---- mileage svg ---- */
function drawMileage(data){
  const W=520,H=190,L=44,R=10,T=14,B=26;
  const xs=data.map(d=>d[0]),ys=data.map(d=>d[1]);
  const x0=Math.min(...xs),x1=Math.max(...xs),y1=Math.max(...ys);
  const px=v=>L+(v-x0)/(x1-x0)*(W-L-R), py=v=>T+(1-v/(y1*1.08))*(H-T-B);
  let g='';[0,20000,40000].forEach(v=>{const y=py(v);
    g+=`<line class="gl" x1="${L}" y1="${y}" x2="${W-R}" y2="${y}"/><text class="ax" x="${L-6}" y="${y+3}" text-anchor="end">${v/1000?v/1000+'k':'0'}</text>`;});
  [x0,2018,2023,x1].forEach(v=>{g+=`<text class="ax" x="${px(v)}" y="${H-8}" text-anchor="middle">'${String(v).slice(2)}</text>`;});
  const line=data.map((d,i)=>(i?'L':'M')+px(d[0]).toFixed(1)+' '+py(d[1]).toFixed(1)).join(' ');
  const area=`M${px(x0)} ${py(0)} `+data.map(d=>'L'+px(d[0]).toFixed(1)+' '+py(d[1]).toFixed(1)).join(' ')+` L${px(x1)} ${py(0)} Z`;
  const dots=data.map(d=>`<circle cx="${px(d[0]).toFixed(1)}" cy="${py(d[1]).toFixed(1)}" r="2.4" fill="#0C6E6B"/>`).join('');
  const last=data[data.length-1];
  document.getElementById('mileageChart').innerHTML=g+`<path d="${area}" fill="#0C6E6B" opacity="0.08"/><path d="${line}" fill="none" stroke="#0C6E6B" stroke-width="2.2" stroke-linejoin="round"/>`+dots+
    `<text class="ax" x="${px(last[0])}" y="${py(last[1])-8}" text-anchor="end" style="fill:#15181B;font-weight:700">${last[1].toLocaleString()}</text>`;
}

/* ---- router ---- */
function go(id){location.hash = id?('#/'+id):'#/';}
function route(){
  const id=(location.hash.replace(/^#\/?/,'')||'').trim();
  const car=CARS.find(c=>c.id===id);
  if(car) renderCar(car); else renderHome();
}
window.addEventListener('hashchange',route);
route();
</script>
